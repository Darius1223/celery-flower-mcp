name: celery-flower-mcp
description: MCP server that exposes the full Celery Flower REST API — monitor workers, manage tasks, and inspect queues from any AI assistant.
license: MIT
homepage: https://github.com/Darius1223/celery-flower-mcp

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      FLOWER_URL:
        type: string
        default: "http://localhost:5555"
        description: Base URL of your Flower instance
      FLOWER_USERNAME:
        type: string
        description: Basic auth username (optional)
      FLOWER_PASSWORD:
        type: string
        description: Basic auth password (optional)
      FLOWER_API_TOKEN:
        type: string
        description: Bearer token — takes priority over basic auth (optional)
    required: []
  commandFunction: |
    (config) => ({
      command: "uv",
      args: ["run", "python", "-m", "source.main"],
      env: {
        FLOWER_URL: config.FLOWER_URL ?? "http://localhost:5555",
        ...(config.FLOWER_USERNAME && { FLOWER_USERNAME: config.FLOWER_USERNAME }),
        ...(config.FLOWER_PASSWORD && { FLOWER_PASSWORD: config.FLOWER_PASSWORD }),
        ...(config.FLOWER_API_TOKEN && { FLOWER_API_TOKEN: config.FLOWER_API_TOKEN }),
      }
    })
